<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - 西兰卡普</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h1>个人中心</h1>
  </div>

  <div class="container">
    <div class="profile-card">
      <img id="userAvatar" class="avatar">
      <div id="userNickname" class="nickname"></div>
      <button class="btn secondary-btn" id="logoutBtn">退出登录</button>
    </div>

    <div class="title-box">
      <span class="main-title">我的发布</span>
      <div class="divider"></div>
    </div>

    <button class="btn primary-btn" id="goPublishBtn">发布新作品</button>
    <div id="myProductList" class="my-product-list" style="margin-top:20px;"></div>
  </div>

  <div class="tab-bar">
    <a href="index.html" class="tab-item">
      <span class="icon">🏠</span>
      <span>首页</span>
    </a>
    <a href="profile.html" class="tab-item active">
      <span class="icon">👤</span>
      <span>我的</span>
    </a>
  </div>

  <script src="script.js"></script>
</body>
</html>
