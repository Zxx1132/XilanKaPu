<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发布作品 - 西兰卡普</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h1>发布文创作品</h1>
  </div>

  <div class="container">
    <div class="form-box">
      <div class="form-item">
        <label class="label">作品名称</label>
        <input class="input" id="productName" placeholder="请输入作品名称">
      </div>
      <div class="form-item">
        <label class="label">纹样类型</label>
        <select class="select" id="patternType">
          <option value="四十八勾">四十八勾</option>
          <option value="阳雀花">阳雀花</option>
          <option value="岩墙花">岩墙花</option>
          <option value="椅子花">椅子花</option>
          <option value="其他">其他</option>
        </select>
      </div>
      <div class="form-item">
        <label class="label">作品寓意</label>
        <textarea class="textarea" id="productDesc" placeholder="请输入作品描述"></textarea>
      </div>
      <div class="form-item">
        <label class="label">上传图片</label>
        <input type="file" id="imgUpload" accept="image/*">
        <img id="imgPreview" style="width:100%;margin-top:10px;display:none;border-radius:8px;">
        <div id="uploadTip" style="margin-top:8px;color:#666;">请选择图片上传</div>
      </div>
      <button class="btn primary-btn publish-btn" id="publishBtn">发布作品</button>
    </div>
  </div>

  <div class="tab-bar">
    <a href="index.html" class="tab-item">
      <span class="icon">🏠</span>
      <span>首页</span>
    </a>
    <a href="profile.html" class="tab-item">
      <span class="icon">👤</span>
      <span>我的</span>
    </a>
  </div>

  <script src="script.js"></script>
</body>
</html>
