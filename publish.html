<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的 - 西兰卡普文创平台</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 顶部导航 -->
  <div class="header">
    <h1>我的文创作品</h1>
  </div>
  
  <!-- 主要内容 -->
  <div class="container">
    <!-- 用户信息 -->
    <div class="profile-card">
      <img id="userAvatar" class="avatar" src="" alt="用户头像">
      <div id="userNickname" class="nickname"></div>
      <button id="logoutBtn" class="btn secondary-btn" style="width: 100px; margin-top: 15px;">退出登录</button>
    </div>
    
    <!-- 我的发布 -->
    <div class="title-box">
      <span class="main-title">我发布的文创</span>
      <div class="divider"></div>
    </div>
    
    <!-- 发布按钮 -->
    <button id="goPublishBtn" class="btn primary-btn publish-btn">+ 分享新文创</button>
    
    <!-- 我的作品列表 -->
    <div id="myProductList" class="my-product-list"></div>
  </div>
  
  <!-- 底部导航 -->
  <div class="tab-bar">
    <a href="index.html" class="tab-item">
      <span class="tab-icon">🏠</span>
      <span class="tab-text">首页</span>
    </a>
    <a href="profile.html" class="tab-item active">
      <span class="tab-icon">👤</span>
      <span class="tab-text">我的</span>
    </a>
  </div>

  <script src="script.js"></script>
</body>
</html>
